name: Feature Request
description: Suggest an idea or improvement
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Describe the desired behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is the proposed solution preferred?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any mockups, references to other plugins, or other context.
