name: Bug Report
description: Report something that isn't working correctly
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1. Open Neovim
        2. Run `:Okuban`
        3. ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if possible.
    validations:
      required: true

  - type: input
    id: neovim-version
    attributes:
      label: Neovim Version
      description: "Output of `nvim --version` (first line)."
      placeholder: "NVIM v0.10.0"
    validations:
      required: true

  - type: input
    id: gh-version
    attributes:
      label: gh CLI Version
      description: "Output of `gh --version`."
      placeholder: "gh version 2.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11, etc."
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config
      description: Your okuban setup (if non-default).
      render: lua
      value: |
        require("okuban").setup({
          -- ...
        })

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
